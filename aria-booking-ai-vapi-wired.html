<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Talk to ARIA, your AI booking specialist, to schedule your free appointment with Nexus Luma." />
<meta name="theme-color" content="#07189f" />
<title>ARIA Booking Orb | Nexus Luma</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --deep-blue:   #07189f;
    --royal-blue:  #1238c7;
    --sky-blue:    #43c6ee;
    --aqua:        #8af4ee;
    --lime:        #8fff57;
    --white-soft:  rgba(255, 255, 255, 0.92);
    --white-muted: rgba(255, 255, 255, 0.66);
  }
  html { width: 100%; height: 100%; -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
  body {
    width: 100%;
    min-height: 100vh; min-height: -webkit-fill-available; min-height: 100svh;
    overflow: hidden;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
    cursor: pointer; user-select: none; color: white;
    position: relative; isolation: isolate; overscroll-behavior: none;
    background:
      radial-gradient(circle at 78% 12%, rgba(138,244,238,0.95) 0%, rgba(72,203,235,0.75) 26%, rgba(27,104,210,0.38) 47%, transparent 68%),
      radial-gradient(circle at 22% 70%, rgba(48,107,255,0.7) 0%, rgba(26,56,188,0.45) 38%, transparent 64%),
      linear-gradient(123deg, #08158e 0%, #1439c6 39%, #1fa7d8 74%, #8af4ee 100%);
    opacity: 0; transform: translateY(16px);
    transition: opacity 0.55s ease, transform 0.55s cubic-bezier(.22,.8,.22,1);
  }
  body.page-ready { opacity: 1; transform: translateY(0); }
  body::before {
    content: ""; position: fixed; inset: -25%; z-index: -2;
    background: radial-gradient(circle at 52% 50%, rgba(255,255,255,0.18), transparent 28%), radial-gradient(circle at 42% 62%, rgba(0,12,90,0.35), transparent 44%);
    filter: blur(10px); opacity: 0.92; will-change: transform; transform: translateZ(0);
  }
  body::after {
    content: ""; position: fixed; inset: 0; z-index: -1;
    background: linear-gradient(90deg, rgba(0,5,55,0.35), transparent 43%, rgba(159,255,246,0.2));
    pointer-events: none; will-change: transform; transform: translateZ(0);
  }
  .screen { width: min(92vw, 680px); min-height: 520px; display: grid; place-items: center; text-align: center; padding: 44px 22px; }
  .brand-chip {
    width: 48px; height: 48px; display: grid; place-items: center; border-radius: 16px; margin: 0 auto 28px;
    background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), 0 22px 60px rgba(0,18,130,0.22);
    backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
  }
  .brand-chip svg { width: 22px; height: 22px; opacity: 0.95; }
  h1 {
    font-size: clamp(2.15rem, 5vw, 4rem); line-height: 0.96; letter-spacing: -0.07em; font-weight: 800;
    color: var(--white-soft); text-wrap: balance; margin-bottom: 12px; text-shadow: 0 18px 55px rgba(0,20,120,0.24);
  }
  .subhead { color: var(--white-muted); font-size: clamp(0.95rem, 1.9vw, 1.1rem); line-height: 1.5; margin-bottom: 50px; }
  .voice-stage {
    appearance: none; -webkit-appearance: none; border: 0; background: transparent; cursor: pointer;
    position: relative; width: 260px; height: 260px; margin-inline: auto; display: grid; place-items: center;
    touch-action: manipulation; -webkit-tap-highlight-color: transparent; border-radius: 50%; outline: none;
  }
  .voice-stage:focus-visible { outline: 3px solid rgba(138,244,238,0.85); outline-offset: 6px; }
  .voice-stage::before, .voice-stage::after {
    content: ""; position: absolute; inset: 18px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.16); transform: scale(1); opacity: 0.6;
    transition: opacity 0.35s ease, transform 0.35s ease;
  }
  .voice-stage::after { inset: 0; opacity: 0.25; }
  body.connecting .voice-stage::before,
  body.listening  .voice-stage::before,
  body.speaking   .voice-stage::before { animation: ring-pulse 1.8s ease-out infinite; }
  body.speaking   .voice-stage::after  { animation: ring-pulse 1.15s ease-out infinite; }
  @keyframes ring-pulse {
    0%   { transform: scale(0.82); opacity: 0.58; }
    70%  { transform: scale(1.22); opacity: 0; }
    100% { transform: scale(1.22); opacity: 0; }
  }
  .loader-wrapper {
    position: relative; display: flex; align-items: center; justify-content: center;
    width: 180px; height: 180px; font-family: Inter, sans-serif; font-size: 1.18rem;
    letter-spacing: 0.02em; font-weight: 520; color: white; border-radius: 50%;
    background-color: transparent; user-select: none; transform: translateZ(0);
    will-change: transform; transition: transform 0.35s cubic-bezier(.22,.8,.22,1);
  }
  .loader {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    border-radius: 50%; background-color: transparent;
    animation: loader-rotate 2.2s linear infinite;
    z-index: 0; will-change: transform, box-shadow; transform: translateZ(0);
  }
  @keyframes loader-rotate {
    0%   { transform: rotate(90deg);  box-shadow: 0 10px 20px 0 rgba(255,255,255,0.96) inset, 0 22px 30px 0 rgba(143,255,87,0.62) inset, 0 62px 68px 0 rgba(18,56,199,0.92) inset; }
    50%  { transform: rotate(270deg); box-shadow: 0 10px 20px 0 rgba(255,255,255,0.92) inset, 0 20px 16px 0 rgba(67,198,238,0.78) inset, 0 46px 66px 0 rgba(7,24,159,0.96) inset; }
    100% { transform: rotate(450deg); box-shadow: 0 10px 20px 0 rgba(255,255,255,0.96) inset, 0 22px 30px 0 rgba(143,255,87,0.62) inset, 0 62px 68px 0 rgba(18,56,199,0.92) inset; }
  }
  @media (max-width: 520px) { .loader { animation-duration: 2.8s; } }
  .loader-letter {
    display: inline-block; opacity: 0.46; transform: translateY(0);
    animation: loader-letter-anim 2s infinite; z-index: 1; border-radius: 50ch; border: none;
    text-shadow: 0 8px 26px rgba(0,18,120,0.5); will-change: opacity, transform;
  }
  .loader-letter:nth-child(1) { animation-delay: 0s; }
  .loader-letter:nth-child(2) { animation-delay: 0.1s; }
  .loader-letter:nth-child(3) { animation-delay: 0.2s; }
  .loader-letter:nth-child(4) { animation-delay: 0.3s; }
  @keyframes loader-letter-anim {
    0%, 100% { opacity: 0.42; transform: translateY(0); }
    20%       { opacity: 1;    transform: scale(1.15); }
    40%       { opacity: 0.72; transform: translateY(0); }
  }
  body.connecting .loader-wrapper { animation: orb-breathe 1.8s ease-in-out infinite; }
  body.listening  .loader-wrapper { transform: scale(1.03) translateZ(0); }
  body.speaking   .loader-wrapper { transform: scale(1.08) translateZ(0); }
  body.speaking   .loader         { animation-duration: 1.05s; }
  @keyframes orb-breathe {
    0%, 100% { transform: scale(1) translateZ(0); }
    50%       { transform: scale(1.045) translateZ(0); }
  }
  .status {
    min-height: 28px; margin-top: 34px; font-size: 0.95rem;
    color: rgba(255,255,255,0.76); letter-spacing: -0.01em; overflow: hidden; width: 100%; max-width: 100%;
  }
  .hint {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    margin-top: 14px; padding: 10px 16px; border-radius: 999px;
    color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.18);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    font-size: 0.82rem; min-width: 240px; transition: opacity 0.3s ease;
  }
  .hint-dot {
    width: 8px; height: 8px; border-radius: 999px;
    background: var(--lime); box-shadow: 0 0 18px rgba(143,255,87,0.9); flex-shrink: 0;
  }
  body.speaking .hint-dot { animation: dot-speaking 0.7s ease-in-out infinite alternate; }
  @keyframes dot-speaking {
    from { transform: scale(1);    box-shadow: 0 0 18px rgba(143,255,87,0.9); }
    to   { transform: scale(1.55); box-shadow: 0 0 28px rgba(143,255,87,1);   }
  }
  .clarity-flash {
    display: inline-flex; align-items: center; justify-content: center;
    min-height: 28px; margin-top: 10px; padding: 7px 13px; border-radius: 999px;
    color: rgba(255,255,255,0.88); background: rgba(143,255,87,0.14);
    border: 1px solid rgba(143,255,87,0.28); box-shadow: 0 0 0 rgba(143,255,87,0);
    font-size: 0.76rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    opacity: 0; transform: translateY(-4px) scale(0.98);
    transition: opacity 0.22s ease, transform 0.22s ease;
    pointer-events: none;
  }
  body.listening .clarity-flash {
    opacity: 1; transform: translateY(0) scale(1);
    animation: speak-clear-flash 1.15s ease-in-out infinite;
  }
  @keyframes speak-clear-flash {
    0%, 100% { box-shadow: 0 0 0 0 rgba(143,255,87,0.2); }
    45%      { box-shadow: 0 0 28px 2px rgba(143,255,87,0.34); }
  }
  .transcript-area {
    width: 100%; max-width: 500px; max-height: 0; overflow: hidden; margin-top: 0;
    display: flex; flex-direction: column; gap: 8px; opacity: 0;
    transition: max-height 0.45s cubic-bezier(.22,.8,.22,1), opacity 0.35s ease, margin-top 0.35s ease;
    pointer-events: none; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.2) transparent;
  }
  body.listening .transcript-area,
  body.speaking  .transcript-area {
    max-height: 220px; opacity: 1; margin-top: 18px;
    overflow-y: auto; pointer-events: auto; -webkit-overflow-scrolling: touch;
  }
  .transcript-area::-webkit-scrollbar { width: 3px; }
  .transcript-area::-webkit-scrollbar-track { background: transparent; }
  .transcript-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 99px; }
  @keyframes msg-appear {
    from { opacity: 0; transform: translateY(8px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0)   scale(1);    }
  }
  .chat-msg {
    max-width: 82%; padding: 9px 14px; border-radius: 18px; font-size: 0.86rem;
    line-height: 1.5; animation: msg-appear 0.22s cubic-bezier(.22,.8,.22,1) both; word-break: break-word;
  }
  .chat-msg.aria {
    align-self: flex-start; background: rgba(255,255,255,0.11);
    border: 1px solid rgba(255,255,255,0.16); color: rgba(255,255,255,0.93);
    border-bottom-left-radius: 4px; text-align: left;
  }
  .chat-msg.user {
    align-self: flex-end; background: rgba(138,244,238,0.14);
    border: 1px solid rgba(138,244,238,0.24); color: rgba(255,255,255,0.88);
    border-bottom-right-radius: 4px; text-align: right;
  }
  .chat-msg.partial { opacity: 0.52; animation: none; font-style: italic; }
  .aria-thinking {
    align-self: flex-start; display: flex; align-items: center; gap: 5px;
    padding: 11px 16px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 18px; border-bottom-left-radius: 4px;
    animation: msg-appear 0.22s cubic-bezier(.22,.8,.22,1) both;
  }
  .aria-thinking span {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(138,244,238,0.75); animation: thinking-dot 1.1s ease-in-out infinite;
  }
  .aria-thinking span:nth-child(2) { animation-delay: 0.18s; }
  .aria-thinking span:nth-child(3) { animation-delay: 0.36s; }
  @keyframes thinking-dot {
    0%, 80%, 100% { opacity: 0.28; transform: scale(0.75); }
    40%           { opacity: 1;    transform: scale(1.15); }
  }
  @media (max-width: 520px) {
    .screen { min-height: 100vh; min-height: 100svh; padding: 34px 18px; }
    .voice-stage { width: 220px; height: 220px; }
    .loader-wrapper { width: 155px; height: 155px; font-size: 1.05rem; }
    .subhead { margin-bottom: 34px; }
    .brand-chip { backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
    .hint { backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
    body.listening .transcript-area, body.speaking .transcript-area { max-height: 160px; }
  }
  @media (hover: none), (pointer: coarse) { body { cursor: default; } }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
    body { opacity: 1; transform: none; }
  }
  @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
    .brand-chip { background: rgba(255,255,255,0.2); }
    .hint { background: rgba(255,255,255,0.18); }
  }
</style>
</head>
<body>
  <main class="screen" aria-label="ARIA Booking Orb">
    <section class="hero-content">
      <div class="brand-chip" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" role="img" aria-hidden="true">
          <path d="M8.25 10.1h7.5c1.02 0 1.85.83 1.85 1.85v.1c0 1.02-.83 1.85-1.85 1.85h-7.5A1.85 1.85 0 0 1 6.4 12.05v-.1c0-1.02.83-1.85 1.85-1.85Z" stroke="white" stroke-width="1.55"/>
          <path d="M9.7 12h.02M14.28 12h.02" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
      </div>
      <h1>Meet Aria<br />Live</h1>
      <p class="subhead">Click the orb to see how Aria qualifies and books leads</p>

      <button
        class="voice-stage"
        type="button"
        id="orbBtn"
        aria-label="Start ARIA booking assistant — activates microphone"
        aria-pressed="false"
        onclick="toggleCall(event)"
      >
        <div class="loader-wrapper" aria-hidden="true">
          <span class="loader-letter">A</span>
          <span class="loader-letter">R</span>
          <span class="loader-letter">I</span>
          <span class="loader-letter">A</span>
          <div class="loader"></div>
        </div>
      </button>

      <p class="status" id="statusEl" aria-live="polite" aria-atomic="true"></p>
      <div class="hint" role="status" aria-live="polite">
        <span class="hint-dot" aria-hidden="true"></span>
        <span id="hintText">Click the orb to activate mic permission and start your guided demo</span>
      </div>
      <div class="clarity-flash" aria-hidden="true">Speak clearly</div>
      <div class="transcript-area" id="transcriptArea" aria-live="polite" aria-label="Live conversation transcript"></div>
    </section>
  </main>

<script>
  /* ═══════════════════════════════════════════════════════════════
     CONFIG
  ═══════════════════════════════════════════════════════════════ */
  var VAPI_KEY     = 'd2c686ae-6c7b-4286-8f77-22f11df7ef44';
  var ASSISTANT_ID = '230bdd16-e11a-413d-834b-7b1d07c26e19';
  var FORCE_INLINE_ASSISTANT = false;
  var NEXT_STEP_URL = 'https://nexusluma.com/aria-strategy-apple';
  var VAPI_SDK_URLS = [
    'https://cdn.jsdelivr.net/npm/@vapi-ai/web@2.5.2/+esm',
    'https://esm.sh/@vapi-ai/web@2.5.2?bundle',
    'https://esm.sh/@vapi-ai/web@2?bundle',
    'https://cdn.jsdelivr.net/npm/@vapi-ai/web@2/+esm'
  ];
  var ARIA_SHEETS_WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbza9Qj1vdM40pKJRNpPtjoHMC6iSPftwZ5guMbMT1r0WknCFp-9MJ0Tgl669PYIWnM4qw/exec';

  /* ─────────────────────────────────────────────────────────────
     TRANSCRIBER CONFIG
  ───────────────────────────────────────────────────────────── */
  var TRANSCRIBER_CONFIG = {
    provider:    'deepgram',
    model:       'nova-2-general',
    language:    'en-US',
    smartFormat: true,
    endpointing: 100
  };

  /* ─────────────────────────────────────────────────────────────
     SPEAKING / STOP-SPEAKING PLANS
  ───────────────────────────────────────────────────────────── */
  var SPEAKING_PLAN_CONFIG = {
    waitSeconds: 0.2,
    transcriptionEndpointingPlan: {
      onPunctuationSeconds:   0.3,
      onNoPunctuationSeconds: 1.2,
      onNumberSeconds:        1.4
    }
  };

  var STOP_SPEAKING_PLAN_CONFIG = {
    numWords:       2,
    voiceSeconds:   0.2,
    backoffSeconds: 0.4
  };

  /* ─────────────────────────────────────────────────────────────
     ASSISTANT_OVERRIDES
     FIX 8: Added backgroundSpeechDenoisingPlan (was missing from
     ASSISTANT_ID path; present only in inline config previously).
  ───────────────────────────────────────────────────────────── */
  var ASSISTANT_OVERRIDES = {
    transcriber:       TRANSCRIBER_CONFIG,
    startSpeakingPlan: SPEAKING_PLAN_CONFIG,
    stopSpeakingPlan:  STOP_SPEAKING_PLAN_CONFIG,
    backgroundSpeechDenoisingPlan: { smartDenoisingPlan: { enabled: true } }
  };

  var INLINE_ASSISTANT = {
    name: 'ARIA',
    transcriber: TRANSCRIBER_CONFIG,
    model: {
      provider: 'openai',
      model: 'gpt-4o-mini',
      temperature: 0.2,
      maxTokens: 280,
      messages: [{
        role: 'system',
        content: `You are ARIA — a sharp, warm AI booking specialist for Nexus Luma. You talk like a real person: natural, confident, never robotic.

CONVERSATION RULES:
- Keep every reply to 1–2 short sentences MAX. If you need more, break it into turns.
- Never list questions. Ask ONE thing at a time, then wait.
- Acknowledge what the person said before moving on — it shows you're listening.
- Use contractions (you're, I'll, that's) and casual phrases (sounds good, got it, perfect).
- Never say "Great!" or "Absolutely!" — vary your acknowledgments.

ACCURACY & CONFIRMATION RULES — follow these every time without exception:
- NAME: After the person gives their name, always repeat it back immediately. Example: "Nice to meet you, Sarah — did I get that right?" If they correct you, apologise briefly and confirm the corrected version.
- BUSINESS NAME: After they say their business name, read it back exactly. Example: "Got it — so the business is Blue Ridge Media, correct?"
- EMAIL: This is critical. Do not guess or infer an email from a messy transcript. Ask them to spell the part before the at sign one character at a time, then ask for the domain one character at a time, then ask for the ending such as dot com. Repeat it back slowly using letters and words, for example: "Let me read that back — S as in Sam, A as in Apple, R as in Robert, A as in Apple, H as in Henry, at Gmail dot com — is every character right?" Wait for explicit confirmation before moving on. If even one letter is unclear, ask for that part again.
- LOCATION: Confirm city and state together. Example: "And you're based in Austin, Texas — is that right?"
- AVAILABILITY: Confirm the day and time clearly. Example: "So Tuesday at 2 PM works for you — perfect, I've got that."
- If anything sounds unclear or you aren't 100% sure of a spelling, ask them to spell it out. Example: "Could you spell that for me so I make sure I get it exactly right?"
- Never guess, assume, or move on until the person verbally confirms each detail is correct.

YOUR GOAL:
Naturally collect these required details before ending: first name, business name, city/location, email, and when they're free for a strategy call. Then explain the $197 strategy call — Nexus Luma maps their brand, booking flow, and AI system in one session.

REQUIRED ORDER:
1. Confirm name.
2. Ask for business name and confirm it.
3. Ask for city/location and confirm it.
4. Ask for email using the character-by-character process above and confirm it.
5. Ask when they are free for the strategy call and confirm day/time.
Do not stop after the business name. Keep going until every required detail is confirmed.

COMPLETION RULE:
- Do not finish early.
- Do not say the completion phrase until you have confirmed all required details: name, business name, location, email, and availability.
- Once everything is collected and confirmed, briefly read all details back as a summary.
- Then say exactly: "We are all set."
- After saying that exact phrase, stop talking and let the page move to the next step.

START: Greet them warmly and ask their name. Nothing else yet.`
      }]
    },
    voice: {
      provider: '11labs',
      voiceId: '21m00Tcm4TlvDq8ikWAM',
      stability: 0.5,
      similarityBoost: 0.8,
      optimizeStreamingLatency: 4,
      useSpeakerBoost: true
    },
    startSpeakingPlan: SPEAKING_PLAN_CONFIG,
    stopSpeakingPlan: STOP_SPEAKING_PLAN_CONFIG,
    backgroundSpeechDenoisingPlan: { smartDenoisingPlan: { enabled: true } },
    firstMessage: "Hey, I'm ARIA. Nice to meet you — what's your name?"
  };

  /* ═══════════════════════════════════════════════════════════════
     LEAD STATE
     FIX 1: Removed dead variable `assistantContextSent` — it was
     declared and set to false but never read or set to true anywhere
     in the codebase. Eliminated to prevent future confusion.
  ═══════════════════════════════════════════════════════════════ */
  var bookingLead = {
    sessionId: generateUUID(), name: '', businessName: '', location: '', email: '',
    phone: '', appointmentTime: '', availability: '', service: '', pain: '', spend: '',
    bookingIntent: false, completionPhrase: false, rawTranscript: []
  };

  var vapi = null, active = false, starting = false, finishing = false;
  var connectingTimer = null, backendSyncTimer = null, micWatchdogTimer = null;
  var startupErrorTimer = null;
  var completionRedirectTimer = null;
  var lastTranscriptKey = '', lastUserTranscriptAt = 0;
  var callEndHandled = false;
  var redirectStarted = false;
  /* Tracks consecutive recoverable errors mid-call; if > threshold,
     we assume the call is silently dead and do a clean teardown.    */
  var recoverableErrorCount = 0;
  var MAX_RECOVERABLE_ERRORS = 5;

  /* FIX 9: Track the last conversation-update key separately so it
     never pre-empts the UI bubble from the real transcript final event. */
  var lastConvUpdateKey = '';

  var COMPLETION_PHRASE_REGEX  = /\b(?:we(?:'re| are) all set|we will talk to you soon|we'll talk to you soon|talk to you soon)\b/i;
  var TAKE_CARE_CLOSEOUT_REGEX = /\btake care[.!?\s]*$/i;
  var COMPLETION_REDIRECT_DELAY_MS = 350;

  var statusEl     = document.getElementById('statusEl');
  var hintTextEl   = document.getElementById('hintText');
  var orbBtn       = document.getElementById('orbBtn');
  var transcriptEl = document.getElementById('transcriptArea');
  var partialMsgEl = null, thinkingEl = null;

  function generateUUID() {
    if (window.crypto && typeof window.crypto.randomUUID === 'function') {
      try { return window.crypto.randomUUID(); } catch (_) {}
    }
    if (window.crypto && window.crypto.getRandomValues) {
      var bytes = new Uint8Array(16);
      window.crypto.getRandomValues(bytes);
      bytes[6] = (bytes[6] & 0x0f) | 0x40; bytes[8] = (bytes[8] & 0x3f) | 0x80;
      var hex = Array.from(bytes).map(function(b) { return b.toString(16).padStart(2,'0'); });
      return [hex.slice(0,4).join(''),hex.slice(4,6).join(''),hex.slice(6,8).join(''),hex.slice(8,10).join(''),hex.slice(10,16).join('')].join('-');
    }

    walk(error, 0);
    /* Capture non-enumerable Error prototype properties */
    if (error && typeof error.message === 'string' && error.message) collected.push(error.message);
    if (error && typeof error.name === 'string' && error.name && error.name !== 'Object' && error.name !== 'Error') {
      collected.push(error.name);
    }
    return collected.filter(Boolean).join(' ').trim();
  }

  /* ─────────────────────────────────────────────────────────────
     isEmptyError — true when getErrorText yields nothing meaningful.
     Handles {}, null, undefined, and objects whose only serialised
     form is '{}' (Daily.co internal lifecycle events fall here).
  ───────────────────────────────────────────────────────────── */
  function isEmptyError(error) {
    return !error || getErrorText(error).replace(/[\s{}"\[\]]+/g, '').length === 0;
  }

  function isMeetingEndedError(error) {
    var text = getErrorText(error);
    return /meeting.*ended|ended.*meeting|ejection|ejected|left.?meeting|call.*ended|ended.*call|has[\s-]ended|disconnected|removed.*meeting|kicked/i.test(text);
  }

  /* ─────────────────────────────────────────────────────────────
     FIX 6 (continued): handleMeetingEndedFromError goToNextStep guard
  ───────────────────────────────────────────────────────────── */
  function handleMeetingEndedFromError(error) {
    console.info('ARIA: meeting-ended via error event; clean teardown.', error);
    if (callEndHandled) return;
    callEndHandled = true;
    active=false; starting=false;
    clearTimeout(connectingTimer); clearTimeout(micWatchdogTimer);
    removeThinking(); finalizePartialTranscript();
    setState(''); setHintMessage('Click the orb to activate mic permission and start your guided demo');
    saveLeadSnapshot();
    syncToSheets(finishing ? 'completion' : 'call-end', { keepalive: true, preferBeacon: true });
    /* FIX 6: Guard — only redirect if scheduleCompletionRedirect hasn't fired yet */
    if (finishing && !redirectStarted) {
      setHintMessage('All set \u2014 taking you to the next step\u2026');
      goToNextStep();
    }
  }

  function isFatalVapiError(error) {
    var type  = String((error&&error.type)  || '');
    var stage = String((error&&error.stage) || '');
    return /start|join|reconnect|web-call/i.test(type+' '+stage);
  }

  function handleFinalTranscript(message) {
    var text = extractMessageText(message); if (!text) return;
    var role = getMessageRole(message);
    var transcriptKey = role + '|' + text;
    if (transcriptKey === lastTranscriptKey) return;
    lastTranscriptKey = transcriptKey;
    bookingLead.rawTranscript.push({ at: new Date().toISOString(), role: role, text: text });

    if (role === 'assistant' && isCompletionPhrase(text)) {
      finishConversationAndAdvance();
      return;
    }

    setTimeout(function() {
      detectLeadFields(text, role);
      scheduleSheetSync('transcript-update');
    }, 0);
  }

  function isCompletionPhrase(text) {
    if (COMPLETION_PHRASE_REGEX.test(text)) return true;
    return TAKE_CARE_CLOSEOUT_REGEX.test(text) && !/\btake care\s+of\b/i.test(text);
  }

  /* ─────────────────────────────────────────────────────────────
     FIX 9: handleConversationUpdate — data sync only, no UI bubbles
     ─────────────────────────────────────────────────────────────
     BEFORE: Called handleFinalTranscript() which could set
     lastTranscriptKey before the real transcript-final event fired.
     This caused the actual transcript-final to skip its bubble-add
     (the key already matched), leaving ARIA silent in the UI.

     AFTER: conversation-update has its own key (lastConvUpdateKey)
     and only runs lead detection + sheet sync — it never touches
     lastTranscriptKey so it can never block transcript-final's UI.
  ───────────────────────────────────────────────────────────── */
  function handleConversationUpdate(message) {
    var messages = Array.isArray(message.messages) ? message.messages
      : Array.isArray(message.conversation) ? message.conversation : [];
    var reversed = messages.slice().reverse();
    var lastAssistant = null;
    for (var i = 0; i < reversed.length; i++) {
      if (getMessageRole(reversed[i]) === 'assistant' && extractMessageText(reversed[i])) {
        lastAssistant = reversed[i]; break;
      }
    }
    if (!lastAssistant) return;
    var text = extractMessageText(lastAssistant);
    if (!text) return;
    var convKey = 'assistant|' + text;
    /* Only process if this text hasn't been handled by a prior conv-update */
    if (convKey === lastConvUpdateKey) return;
    lastConvUpdateKey = convKey;
    /* Data sync only — never touch lastTranscriptKey or add UI bubbles */
    if (isCompletionPhrase(text) && !finishing) {
      finishConversationAndAdvance();
      return;
    }
    setTimeout(function() {
      detectLeadFields(text, 'assistant');
      scheduleSheetSync('conv-update');
    }, 0);
  }

  function finishConversationAndAdvance() {
    if (finishing) return;
    finishing=true; bookingLead.completionPhrase=true;
    if (isStorageAvailable()) { try { localStorage.setItem('ariaBookingLead', JSON.stringify(bookingLead)); } catch(_) {} }
    syncToSheets('completion');
    setHintMessage('All set \u2014 taking you to the next step\u2026');
    if (!document.body.classList.contains('speaking')) scheduleCompletionRedirect('completion-phrase');
  }

  function scheduleCompletionRedirect(reason) {
    if (redirectStarted) return;
    redirectStarted = true;
    clearTimeout(completionRedirectTimer);
    completionRedirectTimer = setTimeout(function() {
      if (vapi && active) { try { vapi.stop(); } catch(e) { console.warn('ARIA: Could not stop Vapi before redirect:', e); } }
      goToNextStep();
    }, COMPLETION_REDIRECT_DELAY_MS);
  }

  var PHONETIC_MAP = {
    alpha:'a',bravo:'b',charlie:'c',delta:'d',echo:'e',foxtrot:'f',golf:'g',hotel:'h',india:'i',juliet:'j',
    kilo:'k',lima:'l',mike:'m',november:'n',oscar:'o',papa:'p',quebec:'q',romeo:'r',sierra:'s',tango:'t',
    uniform:'u',victor:'v',whiskey:'w',xray:'x',yankee:'y',zulu:'z',
    apple:'a',boy:'b',cat:'c',dog:'d',edward:'e',frank:'f',george:'g',henry:'h',ida:'i',john:'j',
    king:'k',love:'l',mary:'m',nancy:'n',ocean:'o',peter:'p',queen:'q',robert:'r',sam:'s',thomas:'t',
    uncle:'u',william:'w',young:'y',zebra:'z'
  };
  function resolvePhonetic(token) { var t=token.toLowerCase(); if (t.length===1) return t; return PHONETIC_MAP[t]||token; }
  function normalizeSpokenIdentifier(raw) {
    return raw
      .replace(/\bat\b/gi,'@').replace(/\bdot\b/gi,'.').replace(/\bperiod\b/gi,'.').replace(/\bunderscore\b/gi,'_').replace(/\bdash\b/gi,'-').replace(/\bhyphen\b/gi,'-')
      .split(/\s+/).map(resolvePhonetic).join('').replace(/\s+/g,'').toLowerCase();
  }
  function extractSpokenEmail(text) {
    var directMatch = text.match(/[A-Z0-9._%+\-]+@[A-Z0-9.\-]+\.[A-Z]{2,}/i);
    if (directMatch) return directMatch[0].toLowerCase();
    var spokenMatch = text.match(/([A-Za-z0-9 .]+?)\s+(?:at)\s+([A-Za-z0-9 .]+?)\s+(?:dot)\s+([A-Za-z]{2,})/i);
    if (spokenMatch) {
      var local=normalizeSpokenIdentifier(spokenMatch[1]), domain=normalizeSpokenIdentifier(spokenMatch[2]), tld=normalizeSpokenIdentifier(spokenMatch[3]);
      var email=local+'@'+domain+'.'+tld;
      if (/^[a-z0-9._+-]+@[a-z0-9.-]+\.[a-z]{2,}$/.test(email)) return email;
    }
    return null;
  }
  function extractMessageText(message) {
    if (!message) return '';
    if (Array.isArray(message.content)) { return message.content.map(function(part) { return typeof part==='string'?part:(part.text||part.content||''); }).join(' ').trim(); }
    return String(message.transcript||message.text||message.content||message.message||'').trim();
  }
  function getMessageRole(message) {
    if (!message) return 'unknown';
    var roleField = String(message.role||'');
    if (roleField) { if (/user|customer|human/i.test(roleField)) return 'user'; if (/assistant|bot|aria|ai/i.test(roleField)) return 'assistant'; }
    var typeField = String(message.type||message.speaker||'');
    if (/user|customer|human/i.test(typeField)) return 'user';
    if (/assistant|bot|aria|ai/i.test(typeField)) return 'assistant';
    return 'unknown';
  }

  function detectLeadFields(text, role) {
    var emailFound = extractSpokenEmail(text); if (emailFound) bookingLead.email = emailFound;
    var phone = text.match(/(?:\+?1[\s\-.]?)?\(?\d{3}\)?[\s\-.]?\d{3}[\s\-.]?\d{4}/);
    if (phone && !bookingLead.phone) bookingLead.phone = phone[0].trim();

    /* ─────────────────────────────────────────────────────────
       FIX 3: Name detection — handle lowercase ASR output
       ─────────────────────────────────────────────────────────
       BEFORE: bareName required /^([A-Z][a-z]+...)/ — capitalized.
       Deepgram ASR commonly returns "john smith" (lowercase) for short
       single-word responses, so names were never captured.
       AFTER: case-insensitive match, result is title-cased for storage.
    ───────────────────────────────────────────────────────── */
    var nameWithPrefix = text.match(/(?:my name is|i am|i'm|i go by|this is|it'?s|call me|actually it'?s|it is|no[,]? it'?s|no[,]? it is)\s+([A-Za-z][a-z]*(?: [A-Za-z][a-z]*){0,3})/i);
    if (nameWithPrefix) {
      bookingLead.name = cleanValue(toTitleCase(nameWithPrefix[1]));
    } else if (role === 'user' && !bookingLead.name) {
      var bareName = /^([A-Za-z][a-z]*(?: [A-Za-z][a-z]*){0,2})[.,!?]?\s*$/i.exec(text);
      if (bareName && text.length < 40) bookingLead.name = cleanValue(toTitleCase(bareName[1]));
    }

    if (!bookingLead.businessName) { var biz=text.match(/(?:business(?:\s+name)? is|company(?:\s+name)? is|my business is|my company is|we are called|it'?s called|we go by|called)\s+([^,.!?]{2,70})/i); if (biz) bookingLead.businessName=cleanValue(biz[1]); }
    if (!bookingLead.location) { var loc=text.match(/(?:located in|location is|we are in|i'?m in|i am in|based in|out of|from)\s+([^,.!?]{2,60})/i); if (loc) bookingLead.location=cleanValue(loc[1]); }
    if (!bookingLead.appointmentTime) { var appointmentTime = extractAppointmentTime(text); if (appointmentTime) bookingLead.appointmentTime = appointmentTime; }
    if (!bookingLead.availability) { var av=text.match(/\b(anytime|flexible|any (?:day|time)|works for (?:me|us)|availability (?:is|looks))([^.!?]{0,60})/i); if (av) bookingLead.availability=cleanValue((av[1]+av[2]).trim()); }
    if (!bookingLead.bookingIntent) { bookingLead.bookingIntent=/\b(book|booking|appointment|schedule|calendar|call|consultation|meeting|slot)\b/i.test(text); }
    if (!bookingLead.service) { var svc=text.match(/(?:(?:my |our )?(?:service is|services? (?:include|are)|we (?:offer|do|provide|specialize in|focus on)|i (?:offer|do|provide|specialize in|help with)|primary service is|main service is))\s+([^,.!?]{3,80})/i); if (svc) bookingLead.service=cleanValue(svc[1]); }
    if (!bookingLead.pain) { var pain=text.match(/(?:(?:my |our |the )?(?:biggest (?:challenge|problem|issue|struggle) is|challenge is|problem is|pain (?:point )?is|struggling with|having trouble with|issue is|i (?:need help|can't|cannot) (?:with )?|trying to (?:fix|solve|improve)))\s+([^,.!?]{3,100})/i); if (pain) bookingLead.pain=cleanValue(pain[1]); }
    if (!bookingLead.spend) { var spend=text.match(/(?:(?:(?:monthly |weekly |annual |current )?(?:budget|spend|spending|ad spend|revenue|make|earn|doing|bringing in)) (?:is |of |about |around |roughly )?)(\$[\d,]+(?:k|K|m|M)?(?:\s*(?:per|a|\/)\s*(?:month|week|year))?|\d+(?:,\d{3})*(?:k|K|m|M)?(?:\s*(?:per|a|\/)\s*(?:month|week|year))?)/i); if (spend) bookingLead.spend=cleanValue(spend[1]); }
    saveLeadSnapshot();
  }

  /* ─────────────────────────────────────────────────────────────
     FIX 3 (helper): Title-case a name string from ASR output.
  ───────────────────────────────────────────────────────────── */
  function toTitleCase(str) {
    return str.replace(/\b([a-z])/gi, function(_, c) { return c.toUpperCase(); });
  }

  function extractAppointmentTime(text) {
    var clean = String(text || '').replace(/\s+/g, ' ').trim();
    var day = '(?:monday|tuesday|wednesday|thursday|friday|saturday|sunday|today|tomorrow|next\\s+(?:monday|tuesday|wednesday|thursday|friday|saturday|sunday)|next\\s+week|\\d{1,2}[/-]\\d{1,2}(?:[/-]\\d{2,4})?|(?:jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:t(?:ember)?)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)\\s+\\d{1,2})';
    var time = '(?:\\d{1,2}(?::\\d{2})?\\s*(?:a\\.?m\\.?|p\\.?m\\.?)|\\d{1,2}\\s*(?:in the )?(?:morning|afternoon|evening)|noon|midday)';
    var patterns = [
      new RegExp('\\b(' + day + ')\\s*(?:at|around|about|@)?\\s*(' + time + ')\\b[^.!?]{0,24}', 'i'),
      new RegExp('\\b(' + time + ')\\s*(?:on|for)?\\s*(' + day + ')\\b[^.!?]{0,24}', 'i'),
      new RegExp('\\b(?:available|free|open|works for me|can do|prefer|want|schedule(?:d)?|book(?:ed)?|confirm(?:ed)?)\\s+(?:for|on|at)?\\s*(' + day + '[^.!?]{0,45}?' + time + ')', 'i')
    ];
    for (var i = 0; i < patterns.length; i++) {
      var match = clean.match(patterns[i]);
      if (match) return cleanValue((match[1] + (match[2] ? ' ' + match[2] : '')).trim());
    }
    return '';
  }

  /* ─────────────────────────────────────────────────────────────
     FIX 2: cleanValue — fix over-aggressive filler-word stripping
     ─────────────────────────────────────────────────────────────
     BEFORE: /\b(and|but|uh|um|yeah|yes|no|so|like|okay|ok)\b.*$/i
     The ".*$" stripped EVERYTHING from the matched word to end of string.
     "Bread and Butter Co" → "Bread" (destroyed business names).
     "Blue Sky and Beyond LLC" → "Blue Sky" (same issue).

     AFTER: Two separate passes —
     1. Remove mid-phrase filler-only words (uh, um) anywhere.
     2. Strip trailing filler (and|but|yeah|yes|no|so|like|okay|ok)
        ONLY at the very end of the string (anchored with $).
     Words like "and" that connect nouns mid-phrase are preserved.
  ───────────────────────────────────────────────────────────── */
  function cleanValue(value) {
    return value
      .replace(/\s*\b(?:uh|um)\b\s*/gi, ' ')
      .replace(/\s*\b(?:and|but|yeah|yes|no|so|like|okay|ok)\s*$/i, '')
      .replace(/[.!?,]+$/, '')
      .trim();
  }

  function saveLeadSnapshot() {
    var doSave = function() {
      if (!isStorageAvailable()) return;
      try { localStorage.setItem('ariaBookingLead', JSON.stringify(bookingLead)); }
      catch(e) { console.warn('ARIA: Could not save lead snapshot:', e); }
    };
    if (typeof requestIdleCallback === 'function') {
      requestIdleCallback(doSave, { timeout: 2000 });
    } else {
      setTimeout(doSave, 0);
    }
  }

  function goToNextStep() { window.location.href = NEXT_STEP_URL; }

  /* ─────────────────────────────────────────────────────────────
     FIX 12: pagehide — skip duplicate sync when redirect is active
     ─────────────────────────────────────────────────────────────
     BEFORE: pagehide always fired syncToSheets even immediately after
     goToNextStep() was called, causing a redundant 'pagehide' row in
     Google Sheets on every completed booking.
     AFTER: if redirect was already started (completion path), the
     'completion' sync already ran — skip the pagehide duplicate.
  ───────────────────────────────────────────────────────────── */
  window.addEventListener('pagehide', function() {
    saveLeadSnapshot();
    if (!redirectStarted) {
      syncToSheets(active ? 'pagehide-active-call' : 'pagehide', { preferBeacon: true });
    }
  });

  /* ─────────────────────────────────────────────────────────────
     INIT
  ───────────────────────────────────────────────────────────── */
  document.addEventListener('DOMContentLoaded', function() {
    requestAnimationFrame(function() { requestAnimationFrame(function() { document.body.classList.add('page-ready'); }); });
    /* Pre-warm SDK — errors here are non-fatal, startCall handles retry */
    getVapiConstructor().catch(function(error) { console.error('ARIA WARNING: Vapi SDK preload failed:', error); });
    setStatusText('idle');
    console.info('ARIA: lead sync target is', ARIA_SHEETS_WEBHOOK_URL);
    hydrateLeadFromStoredContext();
    tryAutoStartIfMicAlreadyGranted();
  });

  function tryAutoStartIfMicAlreadyGranted() {
    if (!navigator.permissions || !navigator.permissions.query) return;
    try {
      navigator.permissions.query({ name: 'microphone' }).then(function(permission) {
        if (permission && permission.state === 'granted' && !active && !starting) startCall();
      }).catch(function() {});
    } catch(_) {}
  }
</script>
</body>
</html>
