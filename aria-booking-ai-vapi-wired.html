<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Talk to ARIA, your AI booking specialist, to schedule your free appointment with Nexus Luma." />
<meta name="theme-color" content="#07189f" />
<title>ARIA Booking Orb | Nexus Luma</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --deep-blue: #07189f;
    --royal-blue: #1238c7;
    --sky-blue: #43c6ee;
    --aqua: #8af4ee;
    --lime: #8fff57;
    --white-soft: rgba(255, 255, 255, 0.92);
    --white-muted: rgba(255, 255, 255, 0.66);
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #07189f;
  }

  body {
    min-height: 100svh;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    cursor: pointer;
    user-select: none;
    color: white;
    position: relative;
    isolation: isolate;
    overscroll-behavior: none;
    background:
      radial-gradient(circle at 78% 12%, rgba(138, 244, 238, 0.95) 0%, rgba(72, 203, 235, 0.75) 26%, rgba(27, 104, 210, 0.38) 47%, transparent 68%),
      radial-gradient(circle at 22% 70%, rgba(48, 107, 255, 0.7) 0%, rgba(26, 56, 188, 0.45) 38%, transparent 64%),
      linear-gradient(123deg, #08158e 0%, #1439c6 39%, #1fa7d8 74%, #8af4ee 100%);
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.55s ease, transform 0.55s cubic-bezier(.22,.8,.22,1);
  }

  body.page-ready {
    opacity: 1;
    transform: translateY(0);
  }

  body::before {
    content: "";
    position: fixed;
    inset: -25%;
    z-index: -2;
    background:
      radial-gradient(circle at 52% 50%, rgba(255, 255, 255, 0.18), transparent 28%),
      radial-gradient(circle at 42% 62%, rgba(0, 12, 90, 0.35), transparent 44%);
    filter: blur(10px);
    opacity: 0.92;
    will-change: transform;
    transform: translateZ(0);
  }

  body::after {
    content: "";
    position: fixed;
    inset: 0;
    z-index: -1;
    background: linear-gradient(90deg, rgba(0, 5, 55, 0.35), transparent 43%, rgba(159, 255, 246, 0.2));
    pointer-events: none;
    will-change: transform;
    transform: translateZ(0);
  }

  .screen {
    width: min(92vw, 680px);
    min-height: 520px;
    display: grid;
    place-items: center;
    text-align: center;
    padding: 44px 22px;
  }

  .brand-chip {
    width: 48px;
    height: 48px;
    display: grid;
    place-items: center;
    border-radius: 16px;
    margin: 0 auto 28px;
    background: rgba(255, 255, 255, 0.12);
    border: 1px solid rgba(255, 255, 255, 0.2);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18), 0 22px 60px rgba(0, 18, 130, 0.22);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
  }
  .brand-chip svg { width: 22px; height: 22px; opacity: 0.95; }

  h1 {
    font-size: clamp(2.15rem, 5vw, 4rem);
    line-height: 0.96;
    letter-spacing: -0.07em;
    font-weight: 760;
    color: var(--white-soft);
    text-wrap: balance;
    margin-bottom: 12px;
    text-shadow: 0 18px 55px rgba(0, 20, 120, 0.24);
  }

  .subhead {
    color: var(--white-muted);
    font-size: clamp(0.95rem, 1.9vw, 1.1rem);
    line-height: 1.5;
    margin-bottom: 50px;
  }

  /* ── Voice button ── */
  .voice-stage {
    appearance: none;
    border: 0;
    background: transparent;
    cursor: pointer;
    position: relative;
    width: 260px;
    height: 260px;
    margin-inline: auto;
    display: grid;
    place-items: center;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    border-radius: 50%;
  }

  .voice-stage::before,
  .voice-stage::after {
    content: "";
    position: absolute;
    inset: 18px;
    border-radius: 50%;
    border: 1px solid rgba(255, 255, 255, 0.16);
    transform: scale(1);
    opacity: 0.6;
    transition: opacity 0.35s ease, transform 0.35s ease;
  }
  .voice-stage::after { inset: 0; opacity: 0.25; }

  body.connecting .voice-stage::before,
  body.listening  .voice-stage::before,
  body.speaking   .voice-stage::before { animation: ring-pulse 1.8s ease-out infinite; }
  body.speaking   .voice-stage::after  { animation: ring-pulse 1.15s ease-out infinite; }

  @keyframes ring-pulse {
    0%   { transform: scale(0.82); opacity: 0.58; }
    70%  { transform: scale(1.22); opacity: 0; }
    100% { transform: scale(1.22); opacity: 0; }
  }

  /* ── Orb loader ── */
  .loader-wrapper {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 180px;
    height: 180px;
    font-family: Inter, sans-serif;
    font-size: 1.18rem;
    letter-spacing: 0.02em;
    font-weight: 520;
    color: white;
    border-radius: 50%;
    background-color: transparent;
    user-select: none;
    transform: translateZ(0);
    will-change: transform;
    transition: transform 0.35s cubic-bezier(.22,.8,.22,1);
  }

  .loader {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    aspect-ratio: 1 / 1;
    border-radius: 50%;
    background-color: transparent;
    animation: loader-rotate 2.2s linear infinite;
    z-index: 0;
    will-change: transform;
    transform: translateZ(0);
  }

  @keyframes loader-rotate {
    0% {
      transform: rotate(90deg);
      box-shadow:
        0 10px 20px 0 rgba(255,255,255,0.96) inset,
        0 22px 30px 0 rgba(143,255,87,0.62) inset,
        0 62px 68px 0 rgba(18,56,199,0.92) inset;
    }
    50% {
      transform: rotate(270deg);
      box-shadow:
        0 10px 20px 0 rgba(255,255,255,0.92) inset,
        0 20px 16px 0 rgba(67,198,238,0.78) inset,
        0 46px 66px 0 rgba(7,24,159,0.96) inset;
    }
    100% {
      transform: rotate(450deg);
      box-shadow:
        0 10px 20px 0 rgba(255,255,255,0.96) inset,
        0 22px 30px 0 rgba(143,255,87,0.62) inset,
        0 62px 68px 0 rgba(18,56,199,0.92) inset;
    }
  }

  @media (max-width: 520px) {
    .loader { animation-duration: 2.8s; }
  }

  .loader-letter {
    display: inline-block;
    opacity: 0.46;
    transform: translateY(0);
    animation: loader-letter-anim 2s infinite;
    z-index: 1;
    border-radius: 50ch;
    border: none;
    text-shadow: 0 8px 26px rgba(0, 18, 120, 0.5);
    will-change: opacity, transform;
  }
  .loader-letter:nth-child(1) { animation-delay: 0s; }
  .loader-letter:nth-child(2) { animation-delay: 0.1s; }
  .loader-letter:nth-child(3) { animation-delay: 0.2s; }
  .loader-letter:nth-child(4) { animation-delay: 0.3s; }

  @keyframes loader-letter-anim {
    0%, 100% { opacity: 0.42; transform: translateY(0); }
    20%       { opacity: 1;    transform: scale(1.15); }
    40%       { opacity: 0.72; transform: translateY(0); }
  }

  body.connecting .loader-wrapper { animation: orb-breathe 1.8s ease-in-out infinite; }
  body.listening  .loader-wrapper { transform: scale(1.03) translateZ(0); }
  body.speaking   .loader-wrapper { transform: scale(1.08) translateZ(0); }
  body.speaking   .loader { animation-duration: 1.05s; }

  @keyframes orb-breathe {
    0%, 100% { transform: scale(1) translateZ(0); }
    50%       { transform: scale(1.045) translateZ(0); }
  }

  .status {
    min-height: 28px;
    margin-top: 34px;
    font-size: 0.95rem;
    color: rgba(255, 255, 255, 0.76);
    letter-spacing: -0.01em;
    contain: inline-size;
  }

  .hint {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 14px;
    padding: 10px 16px;
    border-radius: 999px;
    color: rgba(255, 255, 255, 0.8);
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.18);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    font-size: 0.82rem;
    min-width: 240px;
    justify-content: center;
    transition: opacity 0.3s ease;
  }
  .hint-dot {
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: var(--lime);
    box-shadow: 0 0 18px rgba(143, 255, 87, 0.9);
    flex-shrink: 0;
  }

  /* Pulse the hint dot while ARIA is speaking */
  body.speaking .hint-dot {
    animation: dot-speaking 0.7s ease-in-out infinite alternate;
  }
  @keyframes dot-speaking {
    from { transform: scale(1);    box-shadow: 0 0 18px rgba(143,255,87,0.9); }
    to   { transform: scale(1.55); box-shadow: 0 0 28px rgba(143,255,87,1);   }
  }

  body.connecting .status::before                                       { content: "Connecting ARIA…"; }
  body.listening  .status::before                                       { content: "ARIA is listening…"; }
  body.speaking   .status::before                                       { content: "ARIA is speaking…"; }
  body:not(.connecting):not(.listening):not(.speaking) .status::before  { content: "Tap the orb and ARIA will help you book."; }

  /* ══════════════════════════════════════════════════════
     LIVE TRANSCRIPT AREA
  ══════════════════════════════════════════════════════ */
  .transcript-area {
    width: 100%;
    max-width: 500px;
    max-height: 0;
    overflow: hidden;
    margin-top: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
    opacity: 0;
    transition:
      max-height 0.45s cubic-bezier(.22,.8,.22,1),
      opacity    0.35s ease,
      margin-top 0.35s ease;
    pointer-events: none;
  }

  body.listening  .transcript-area,
  body.speaking   .transcript-area {
    max-height: 220px;
    opacity: 1;
    margin-top: 18px;
    overflow-y: auto;
    pointer-events: auto;
  }

  /* Custom scrollbar to match design */
  .transcript-area::-webkit-scrollbar { width: 3px; }
  .transcript-area::-webkit-scrollbar-track { background: transparent; }
  .transcript-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 99px; }

  @keyframes msg-appear {
    from { opacity: 0; transform: translateY(8px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0)   scale(1);    }
  }

  .chat-msg {
    max-width: 82%;
    padding: 9px 14px;
    border-radius: 18px;
    font-size: 0.86rem;
    line-height: 1.5;
    animation: msg-appear 0.22s cubic-bezier(.22,.8,.22,1) both;
    word-break: break-word;
  }

  /* ARIA messages — left side */
  .chat-msg.aria {
    align-self: flex-start;
    background: rgba(255, 255, 255, 0.11);
    border: 1px solid rgba(255, 255, 255, 0.16);
    color: rgba(255, 255, 255, 0.93);
    border-bottom-left-radius: 4px;
    text-align: left;
  }

  /* User messages — right side */
  .chat-msg.user {
    align-self: flex-end;
    background: rgba(138, 244, 238, 0.14);
    border: 1px solid rgba(138, 244, 238, 0.24);
    color: rgba(255, 255, 255, 0.88);
    border-bottom-right-radius: 4px;
    text-align: right;
  }

  /* Live partial (user still speaking) */
  .chat-msg.partial {
    opacity: 0.52;
    animation: none;
    font-style: italic;
  }

  /* ARIA thinking indicator */
  .aria-thinking {
    align-self: flex-start;
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 11px 16px;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    animation: msg-appear 0.22s cubic-bezier(.22,.8,.22,1) both;
  }

  .aria-thinking span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(138, 244, 238, 0.75);
    animation: thinking-dot 1.1s ease-in-out infinite;
  }
  .aria-thinking span:nth-child(2) { animation-delay: 0.18s; }
  .aria-thinking span:nth-child(3) { animation-delay: 0.36s; }

  @keyframes thinking-dot {
    0%, 80%, 100% { opacity: 0.28; transform: scale(0.75); }
    40%           { opacity: 1;    transform: scale(1.15); }
  }

  @media (max-width: 520px) {
    .screen { min-height: 100svh; padding: 34px 18px; }
    .voice-stage { width: 220px; height: 220px; }
    .loader-wrapper { width: 155px; height: 155px; font-size: 1.05rem; }
    .subhead { margin-bottom: 34px; }
    .brand-chip { backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
    .hint { backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
    body.listening .transcript-area,
    body.speaking  .transcript-area { max-height: 160px; }
  }

  @media (hover: none), (pointer: coarse) {
    body { cursor: default; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation: none !important;
      transition: none !important;
    }
    body { opacity: 1; transform: none; }
  }

  @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
    .brand-chip { background: rgba(255, 255, 255, 0.2); }
    .hint { background: rgba(255, 255, 255, 0.18); }
  }
</style>
</head>
<body>
  <main class="screen" aria-label="ARIA Booking Orb">
    <section class="hero-content">
      <div class="brand-chip" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" role="img" aria-hidden="true">
          <path d="M8.25 10.1h7.5c1.02 0 1.85.83 1.85 1.85v.1c0 1.02-.83 1.85-1.85 1.85h-7.5A1.85 1.85 0 0 1 6.4 12.05v-.1c0-1.02.83-1.85 1.85-1.85Z" stroke="white" stroke-width="1.55"/>
          <path d="M9.7 12h.02M14.28 12h.02" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
      </div>
      <h1>Meet Aria<br />Live</h1>
      <p class="subhead">Click the orb to see how Aria qualifies and books leads</p>

      <button
        class="voice-stage"
        type="button"
        id="orbBtn"
        aria-label="Start ARIA booking assistant — activates microphone"
        aria-pressed="false"
        onclick="toggleCall(event)"
      >
        <div class="loader-wrapper" aria-hidden="true">
          <span class="loader-letter">A</span>
          <span class="loader-letter">R</span>
          <span class="loader-letter">I</span>
          <span class="loader-letter">A</span>
          <div class="loader"></div>
        </div>
      </button>

      <p class="status" aria-live="polite" aria-atomic="true"></p>
      <div class="hint" role="status" aria-live="polite">
        <span class="hint-dot" aria-hidden="true"></span>
        <span id="hintText">Click the orb to activate mic permission and start your guided demo</span>
      </div>

      <!-- Live transcript chat area — appears only during active calls -->
      <div class="transcript-area" id="transcriptArea" aria-live="polite" aria-label="Live conversation transcript"></div>
    </section>
  </main>

<script>
  /* ═══════════════════════════════════════════════════════════════
     ██████  CONFIG — EDIT THESE VALUES BEFORE GOING LIVE
  ═══════════════════════════════════════════════════════════════ */

  const VAPI_KEY     = 'd2c686ae-6c7b-4286-8f77-22f11df7ef44';  // Vapi public web key
  const ASSISTANT_ID = '230bdd16-e11a-413d-834b-7b1d07c26e19';  // Vapi dashboard assistant ID
  const NEXT_STEP_URL = 'aria-strategy-apple.html';
  const VAPI_SDK_URLS = [
    'https://esm.sh/@vapi-ai/web@2?bundle',
    'https://cdn.jsdelivr.net/npm/@vapi-ai/web@2/+esm'
  ];

  /* Google Apps Script Web App endpoint — Sheet ID: 1wX6MoaHPzz5-sDpe_X0INsX4-d-BgqrwjpF5vibuJD8 */
  const ARIA_SHEETS_WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbz5H1RnBx0jYitjvd77WuylBul3OmpWMv57CvxbCKPbdRh1UKLfRmLQ10ekdPNnoanY2Q/exec';

  /* ═══════════════════════════════════════════════════════════════
     CONVERSATION TIMING OVERRIDES
     Applied on top of the dashboard assistant to favor complete user turns.
     ─────────────────────────────────────────────────────────────
     AssemblyAI Universal-Streaming has built-in end-of-turn detection
     and is confirmed compatible with this Vapi key.
     These values intentionally trade a little latency for better listening.
     Smart denoising filters ambient noise before transcription.
  ═══════════════════════════════════════════════════════════════ */
  const ASSISTANT_OVERRIDES = {
    transcriber: {
      provider:                         'assembly-ai',
      language:                         'en',
      endOfTurnConfidenceThreshold:     0.75,  /* higher = wait for a clearer endpoint */
      minEndOfTurnSilenceWhenConfident: 1100,  /* ms — allow natural thinking pauses */
      maxTurnSilence:                   4500   /* ms — do not cut off longer answers */
    },
    startSpeakingPlan: {
      waitSeconds: 0.8,
      transcriptionEndpointingPlan: {
        onPunctuationSeconds:   0.75,
        onNoPunctuationSeconds: 2.4,
        onNumberSeconds:        2.8
      }
    },
    stopSpeakingPlan: {
      numWords:       2,
      voiceSeconds:   0.7,
      backoffSeconds: 1.0
    },
    backgroundSpeechDenoisingPlan: {
      smartDenoisingPlan: { enabled: true }
    },
    model: {
      provider:    'openai',
      model:       'gpt-4o-mini',
      temperature: 0.2,
      maxTokens:   160   /* enough for ARIA to spell out a full email */
    }
  };

  /* ═══════════════════════════════════════════════════════════════
     INLINE ASSISTANT FALLBACK
     Only used if ASSISTANT_ID is blank. When ASSISTANT_ID is set,
     all voice/prompt settings come from the Vapi dashboard instead.

     IMPORTANT: If you ARE using the inline assistant, the voice
     provider is set to '11labs' for fastest TTS response times.
     PlayHT adds 300-800 ms extra latency vs 11labs/deepgram.
  ═══════════════════════════════════════════════════════════════ */
  const INLINE_ASSISTANT = {
    name: 'ARIA',
    transcriber: {
      provider:                         'assembly-ai',
      language:                         'en',
      endOfTurnConfidenceThreshold:     ASSISTANT_OVERRIDES.transcriber.endOfTurnConfidenceThreshold,
      minEndOfTurnSilenceWhenConfident: ASSISTANT_OVERRIDES.transcriber.minEndOfTurnSilenceWhenConfident,
      maxTurnSilence:                   ASSISTANT_OVERRIDES.transcriber.maxTurnSilence
    },
    model: {
      provider:    'openai',
      model:       'gpt-4o-mini',
      temperature: 0.2,
      maxTokens:   160,
      messages: [{
        role: 'system',
        content: `You are ARIA — a sharp, warm AI booking specialist for Nexus Luma. You talk like a real person: natural, confident, never robotic.

CONVERSATION RULES:
- Keep every reply to 1–2 short sentences MAX. If you need more, break it into turns.
- Never list questions. Ask ONE thing at a time, then wait.
- Acknowledge what the person said before moving on — it shows you're listening.
- Use contractions (you're, I'll, that's) and casual phrases (sounds good, got it, perfect).
- Never say "Great!" or "Absolutely!" — vary your acknowledgments.

ACCURACY & CONFIRMATION RULES — follow these every time without exception:
- NAME: After the person gives their name, always repeat it back immediately. Example: "Nice to meet you, Sarah — did I get that right?" If they correct you, apologise briefly and confirm the corrected version.
- BUSINESS NAME: After they say their business name, read it back exactly. Example: "Got it — so the business is Blue Ridge Media, correct?"
- EMAIL: This is critical. After they give their email, spell it out letter by letter including the domain. Example: "Let me read that back — S-A-R-A-H at B-L-U-E-R-I-D-G-E dot com — is every letter right?" Wait for explicit confirmation before moving on.
- LOCATION: Confirm city and state together. Example: "And you're based in Austin, Texas — is that right?"
- AVAILABILITY: Confirm the day and time clearly. Example: "So Tuesday at 2 PM works for you — perfect, I've got that."
- If anything sounds unclear or you aren't 100% sure of a spelling, ask them to spell it out. Example: "Could you spell that for me so I make sure I get it exactly right?"
- Never guess, assume, or move on until the person verbally confirms each detail is correct.

YOUR GOAL:
Naturally collect these required details before ending: first name, business name, city/location, email, and when they're free for a strategy call. Then explain the $197 strategy call — Nexus Luma maps their brand, booking flow, and AI system in one session.

COMPLETION RULE:
- Do not finish early.
- Do not say the completion phrase until you have confirmed all required details: name, business name, location, email, and availability.
- Once everything is collected and confirmed, briefly read all details back as a summary.
- Then say exactly: "We are all set."
- After saying that exact phrase, stop talking and let the page move to the next step.

START: Greet them warmly and ask their name. Nothing else yet.`
      }]
    },
    /* 11labs 'Rachel' — fast, natural, warm voice */
    voice: {
      provider:                 '11labs',
      voiceId:                  '21m00Tcm4TlvDq8ikWAM',  /* Rachel */
      stability:                0.5,
      similarityBoost:          0.8,
      optimizeStreamingLatency: 4       /* 0-4 — highest latency optimization */
    },
    startSpeakingPlan:              ASSISTANT_OVERRIDES.startSpeakingPlan,
    stopSpeakingPlan:               ASSISTANT_OVERRIDES.stopSpeakingPlan,
    backgroundSpeechDenoisingPlan:  ASSISTANT_OVERRIDES.backgroundSpeechDenoisingPlan,
    firstMessage: "Hey, I'm ARIA. Nice to meet you — what's your name?"
  };

  /* ═══════════════════════════════════════════════════════════════
     LEAD STATE
  ═══════════════════════════════════════════════════════════════ */
  const bookingLead = {
    sessionId:        (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : String(Date.now()),
    name:             '',
    businessName:     '',
    location:         '',
    email:            '',
    phone:            '',
    appointmentTime:  '',
    availability:     '',
    service:          '',   /* questionnaireService  — col P in sheet */
    pain:             '',   /* questionnairePain     — col Q in sheet */
    spend:            '',   /* questionnaireSpend    — col R in sheet */
    bookingIntent:    false,
    completionPhrase: false,
    rawTranscript:    []
  };

  /* ═══════════════════════════════════════════════════════════════
     RUNTIME STATE
  ═══════════════════════════════════════════════════════════════ */
  let vapi                 = null;
  let active               = false;
  let starting             = false;
  let finishing            = false;
  let connectingTimer      = null;
  let backendSyncTimer     = null;
  let assistantContextSent = false;
  let completionRedirectTimer = null;
  let lastTranscriptKey = '';

  /* Redirect after ARIA says a closeout phrase. */
  const COMPLETION_PHRASE_REGEX = /\b(?:we(?:'re| are) all set|we will talk to you soon|we'll talk to you soon|talk to you soon)\b/i;
  const TAKE_CARE_CLOSEOUT_REGEX = /\btake care[.!?\s]*$/i;
  const COMPLETION_REDIRECT_DELAY_MS = 1600;

  const statusEl      = document.querySelector('.status');
  const hintTextEl    = document.getElementById('hintText');
  const orbBtn        = document.getElementById('orbBtn');
  const transcriptEl  = document.getElementById('transcriptArea');

  /* Transcript UI state */
  let partialMsgEl    = null;   /* The live "user is typing" bubble */
  let thinkingEl      = null;   /* The "ARIA is thinking" dots */

  /* ═══════════════════════════════════════════════════════════════
     UI HELPERS
  ═══════════════════════════════════════════════════════════════ */
  function setState(state) {
    document.body.classList.remove('connecting', 'listening', 'speaking', 'vol-med', 'vol-high');
    if (state) document.body.classList.add(state);
    if (orbBtn) orbBtn.setAttribute('aria-pressed', active ? 'true' : 'false');

    /* Clear transcript when call ends */
    if (!state && transcriptEl) {
      setTimeout(() => {
        transcriptEl.innerHTML = '';
        partialMsgEl = null;
        thinkingEl   = null;
      }, 500);
    }
  }

  function setHintMessage(msg) {
    if (hintTextEl) hintTextEl.textContent = msg || '';
  }

  function readableError(error) {
    if (!error) return 'Unknown error.';
    if (typeof error === 'string') return error;
    return error.message || error.name || 'Unknown error.';
  }

  /* ═══════════════════════════════════════════════════════════════
     TRANSCRIPT UI
  ═══════════════════════════════════════════════════════════════ */

  /**
   * Auto-scroll the transcript to the latest message.
   */
  function scrollTranscript() {
    if (transcriptEl) {
      requestAnimationFrame(() => {
        transcriptEl.scrollTop = transcriptEl.scrollHeight;
      });
    }
  }

  /**
   * Append a finalised chat bubble to the transcript.
   * @param {'aria'|'user'} role
   * @param {string} text
   */
  function appendChatMessage(role, text) {
    if (!transcriptEl || !text || !text.trim()) return;
    const div = document.createElement('div');
    div.className = `chat-msg ${role}`;
    div.textContent = text.trim();
    transcriptEl.appendChild(div);
    scrollTranscript();
  }

  /**
   * Update the live partial transcript bubble (user still speaking).
   * Creates the bubble on first call, reuses it thereafter.
   * @param {string} text
   */
  function updatePartialTranscript(text) {
    if (!transcriptEl) return;
    if (!partialMsgEl) {
      partialMsgEl = document.createElement('div');
      partialMsgEl.className = 'chat-msg user partial';
      transcriptEl.appendChild(partialMsgEl);
    }
    partialMsgEl.textContent = text;
    scrollTranscript();
  }

  /**
   * Promote the partial bubble to a final message (remove italic/opacity).
   */
  function finalizePartialTranscript() {
    if (partialMsgEl) {
      partialMsgEl.classList.remove('partial');
      partialMsgEl = null;
    }
  }

  /**
   * Show the three-dot "ARIA is thinking" indicator.
   */
  function showThinking() {
    removeThinking();
    if (!transcriptEl) return;
    thinkingEl = document.createElement('div');
    thinkingEl.className = 'aria-thinking';
    thinkingEl.innerHTML = '<span></span><span></span><span></span>';
    transcriptEl.appendChild(thinkingEl);
    scrollTranscript();
  }

  /**
   * Remove the thinking indicator.
   */
  function removeThinking() {
    if (thinkingEl) {
      thinkingEl.remove();
      thinkingEl = null;
    }
  }

  /* ═══════════════════════════════════════════════════════════════
     LOCAL STORAGE HELPERS
  ═══════════════════════════════════════════════════════════════ */
  function readJsonStorage(key) {
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : null;
    } catch (e) {
      console.warn('Could not parse localStorage:', key, e);
      return null;
    }
  }

  function getStoredContext() {
    /*
      The Warm Leads questionnaire (Sheet: 16Lpm5EM2oPkT56ddo6VrQirOHSCU6TJYEF4hIwpQtLM)
      stores a FLAT payload: { sessionId, name, email, challenge, contactProcess,
      aiHelp, systemStatus, completed, updatedAt }.
      There is NO .answers nesting — read fields directly off the object.
    */
    const questionnaire = readJsonStorage('nexusQuestionnaireAnswers');
    const homepageEmail = localStorage.getItem('aria_booking_email') || '';

    /* Normalise: support both flat (new) and old nested .answers shape */
    let flat = null;
    if (questionnaire) {
      flat = questionnaire.answers
        ? { ...questionnaire.answers, sessionId: questionnaire.sessionId }
        : questionnaire;   /* already flat */
    }

    return { homepageEmail, questionnaire: flat };
  }

  /* ═══════════════════════════════════════════════════════════════
     LEAD SYNC (Netlify -> Google Sheets)
  ═══════════════════════════════════════════════════════════════ */
  function buildSheetPayload(reason) {
    const context = getStoredContext();
    const q = context.questionnaire || {};   /* flat Warm Leads schema */
    return {
      sessionId:                 bookingLead.sessionId || '',
      eventType:                 reason || '',
      occurredAt:                new Date().toISOString(),
      page:                      window.location.pathname || '',
      name:                      bookingLead.name || q.name || '',
      businessName:              bookingLead.businessName || '',
      location:                  bookingLead.location || '',
      email:                     bookingLead.email || q.email || context.homepageEmail || '',
      phone:                     bookingLead.phone || '',
      appointmentTime:           bookingLead.appointmentTime || '',
      availability:              bookingLead.availability || '',
      bookingIntent:             bookingLead.bookingIntent ? 'Yes' : 'No',
      completionPhrase:          bookingLead.completionPhrase ? 'Yes' : 'No',
      questionnaireName:         q.name || '',
      questionnaireBusinessType: '',   /* not in Warm Leads schema; collected by voice */
      questionnaireService:      bookingLead.service || q.aiHelp || '',
      questionnairePain:         bookingLead.pain    || q.challenge || '',
      questionnaireSpend:        bookingLead.spend   || '',
      transcript: bookingLead.rawTranscript
        .map((t) => `[${String(t.role || 'unknown').toUpperCase()}] ${String(t.text || '')}`)
        .join(' | '),
      updatedAt: new Date().toISOString()
    };
  }

  async function syncToSheets(reason, options) {
    const payload = buildSheetPayload(reason);
    const body = JSON.stringify(payload);

    /* ── sendBeacon path (tab close / pagehide) ── */
    if (options && options.preferBeacon && navigator.sendBeacon) {
      const blob = new Blob([body], { type: 'text/plain;charset=UTF-8' });
      const sent = navigator.sendBeacon(ARIA_SHEETS_WEBHOOK_URL, blob);
      if (!sent) {
        console.warn('ARIA: sendBeacon failed, falling back to fetch');
      } else {
        return;
      }
    }

    /* ── Standard fetch path ── */
    try {
      await fetch(ARIA_SHEETS_WEBHOOK_URL, {
        method:  'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
        body,
        keepalive: Boolean(options && options.keepalive)
      });
      console.info('ARIA: Lead synced to Sheets —', reason);
    } catch (e) {
      console.warn('ARIA: Sheets sync failed (non-blocking):', e.message);
    }
  }

  /* Debounce rapid transcript events — fire once per ~300 ms (was 600 ms) */
  function scheduleSheetSync(reason) {
    clearTimeout(backendSyncTimer);
    backendSyncTimer = setTimeout(() => { syncToSheets(reason); }, 300);
  }

  /* ═══════════════════════════════════════════════════════════════
     ASSISTANT CONTEXT — built BEFORE vapi.start(), not mid-call
  ═══════════════════════════════════════════════════════════════ */

  /**
   * Pull the user's first name from any available source.
   * Priority: voice-collected > questionnaire flat > homepage email prefix
   */
  function getLeadName() {
    if (bookingLead.name) return bookingLead.name;
    const ctx = getStoredContext();
    const q = ctx.questionnaire;
    if (q && q.name) return q.name.trim().split(/\s+/)[0];  /* first name only */
    return '';
  }

  /**
   * Build the system context string to inject BEFORE the call starts.
   * Reads the flat Warm Leads questionnaire schema:
   *   name, email, challenge, contactProcess, aiHelp, systemStatus
   */
  function buildAssistantContextMessage() {
    const context = getStoredContext();
    const q = context.questionnaire || {};
    const parts = [];

    /* Name — flat field from Warm Leads GAS */
    const name = q.name || '';
    if (name) parts.push('User\'s name: ' + name);

    /* Email — flat field, also check homepage */
    const email = q.email || context.homepageEmail || '';
    if (email) parts.push('User\'s email: ' + email);

    /* Challenge — maps to questionnairePain */
    if (q.challenge) parts.push('Their challenge: ' + q.challenge);

    /* aiHelp — maps to questionnaireService */
    if (q.aiHelp) parts.push('What AI help they want: ' + q.aiHelp);

    /* contactProcess & systemStatus — bonus context */
    if (q.contactProcess) parts.push('Contact process: ' + q.contactProcess);
    if (q.systemStatus)   parts.push('Current system: '  + q.systemStatus);

    if (!parts.length) return '';

    return (
      'IMPORTANT — context captured from the user\'s questionnaire before this call. ' +
      'You already know this information — do NOT ask for it again. ' +
      'Use their name naturally from the first word. Details: ' +
      parts.join(' | ')
    );
  }

  /**
   * Removed: sendAssistantContextIfAvailable() via vapi.send() mid-call.
   * Injecting a message while ARIA speaks her firstMessage cuts the audio.
   * Context is now baked into ASSISTANT_OVERRIDES.model.messages in startCall().
   */

  /* ═══════════════════════════════════════════════════════════════
     VAPI INSTANCE
  ═══════════════════════════════════════════════════════════════ */
  let VapiConstructor = null;
  let vapiLoadPromise = null;

  async function getVapiConstructor() {
    if (VapiConstructor) return VapiConstructor;

    if (!vapiLoadPromise) {
      vapiLoadPromise = (async () => {
        const errors = [];

        for (const url of VAPI_SDK_URLS) {
          try {
            const module = await import(url);
            const Constructor = module.default || module.Vapi;
            if (typeof Constructor === 'function') {
              console.info('ARIA: Vapi SDK loaded from', url);
              return Constructor;
            }
            errors.push(`${url}: constructor export missing`);
          } catch (error) {
            errors.push(`${url}: ${readableError(error)}`);
          }
        }

        throw new Error('Vapi web SDK could not load. ' + errors.join(' | '));
      })();
    }

    VapiConstructor = await vapiLoadPromise;
    return VapiConstructor;
  }

  async function ensureVapiInstance() {
    if (!window.isSecureContext) {
      throw new Error('Microphone access requires HTTPS or localhost.');
    }
    if (!vapi) {
      const Vapi = await getVapiConstructor();
      vapi = new Vapi(VAPI_KEY);
      bindVapiEvents();
    }
    return vapi;
  }

  /* ═══════════════════════════════════════════════════════════════
     ORB CLICK — MIC PERMISSION + CALL START
  ═══════════════════════════════════════════════════════════════ */
  async function toggleCall(event) {
    if (event) event.stopPropagation();
    (active || starting) ? endCall() : await startCall();
  }

  window.toggleCall = toggleCall;

  async function startCall() {
    if (!VAPI_KEY) {
      setHintMessage('VAPI_KEY is not configured. Contact support.');
      console.error('ARIA: VAPI_KEY is empty.');
      return;
    }

    try {
      starting = true;
      setState('connecting');
      setHintMessage('Allow microphone access when your browser asks…');

      /*
        Connection timeout guard — bail after 20 s so user isn't stuck.
      */
      connectingTimer = setTimeout(() => {
        if (!active) {
          console.warn('ARIA: connection timed out after 20 s');
          starting = false;
          setState('');
          setHintMessage('Connection timed out — tap the orb to try again');
          if (vapi) { try { vapi.stop(); } catch (_) {} }
        }
      }, 20000);

      await ensureVapiInstance();

      /*
        Build context once, inject it into the overrides BEFORE vapi.start().
        This avoids the mid-stream vapi.send() that was cutting ARIA's greeting.
        If a name is known from the questionnaire, personalise the firstMessage too.
      */
      const contextMsg  = buildAssistantContextMessage();
      const knownName   = getLeadName();

      /* Clone overrides so we don't mutate the shared object between calls */
      const overrides = JSON.parse(JSON.stringify(ASSISTANT_OVERRIDES));

      if (contextMsg) {
        overrides.model = overrides.model || {};
        overrides.model.messages = [{ role: 'system', content: contextMsg }];
      }

      if (knownName) {
        /* Personalised opener — skips asking for name since we already know it */
        overrides.firstMessage =
          `Hey ${knownName}! I'm ARIA from Nexus Luma — I saw your questionnaire. ` +
          `Ready to get your strategy call booked?`;
      }

      if (ASSISTANT_ID) {
        await vapi.start(ASSISTANT_ID, overrides);
      } else {
        /* Inline assistant — merge overrides in */
        const inline = JSON.parse(JSON.stringify(INLINE_ASSISTANT));
        if (contextMsg) {
          inline.model.messages.unshift({ role: 'system', content: contextMsg });
        }
        if (knownName) {
          inline.firstMessage =
            `Hey ${knownName}! I'm ARIA from Nexus Luma — I saw your questionnaire. ` +
            `Ready to get your strategy call booked?`;
        }
        await vapi.start(inline);
      }

    } catch (error) {
      clearTimeout(connectingTimer);
      const message = readableError(error);
      console.error('Vapi start failed:', error);
      active = false;
      starting = false;
      setState('');
      setHintMessage('Could not start — check browser console for details');
      alert('ARIA could not start: ' + message);
    }
  }

  function endCall() {
    starting = false;
    if (vapi) {
      try { vapi.stop(); } catch (e) { console.warn('vapi.stop() error:', e); }
    }
  }

  /* ═══════════════════════════════════════════════════════════════
     VAPI EVENT BINDINGS
  ═══════════════════════════════════════════════════════════════ */
  function bindVapiEvents() {

    vapi.on('call-start', () => {
      clearTimeout(connectingTimer);
      starting = false;
      active    = true;
      finishing = false;
      clearTimeout(completionRedirectTimer);
      setState('listening');
      setHintMessage('Speak naturally — ARIA will guide you');
      /* Context is already baked into overrides before vapi.start() — no mid-call injection needed */
      syncToSheets('call-start');
    });

    vapi.on('call-end', () => {
      clearTimeout(connectingTimer);
      starting = false;
      active = false;
      removeThinking();
      finalizePartialTranscript();
      setState('');
      setHintMessage('Click the orb to activate mic permission and start your guided demo');
      saveLeadSnapshot();
      syncToSheets(
        finishing ? 'completion' : 'call-end',
        { keepalive: true, preferBeacon: true }
      );
      if (finishing) {
        setHintMessage('All set — taking you to the next step…');
        goToNextStep();
      }
    });

    /* speech-start / speech-end refer to ARIA's TTS output */
    vapi.on('speech-start', () => {
      removeThinking();   /* ARIA started talking — hide the dots */
      setState('speaking');
    });

    vapi.on('speech-end', () => {
      setState('listening');
    });

    vapi.on('volume-level', (vol) => {
      document.body.classList.remove('vol-med', 'vol-high');
      if (vol > 0.6)       document.body.classList.add('vol-high');
      else if (vol > 0.25) document.body.classList.add('vol-med');
    });

    /*
      MESSAGE ROUTING
      ─────────────────────────────────────────────────────────────
      transcript + transcriptType 'partial' → live preview bubble
      transcript + transcriptType 'final'   → finalise bubble + detection + sync
      assistant / bot type                  → ARIA reply bubble + detection
    */
    vapi.on('message', (message) => {
      if (!message) return;

      const msgType        = message.type || '';
      const transcriptType = message.transcriptType || message.transcript_type || '';
      const role           = getMessageRole(message);

      /* ── Transcript stream ── */
      if (msgType === 'transcript') {

        if (transcriptType === 'partial') {
          if (role !== 'user') return;
          /* Show what the user is saying in real-time */
          const text = extractMessageText(message);
          if (text) updatePartialTranscript(text);
          return;
        }

        if (transcriptType === 'final') {
          const text = extractMessageText(message);
          if (text) {
            finalizePartialTranscript();           /* Lock the partial bubble */

            if (role === 'assistant') {
              removeThinking();
              appendChatMessage('aria', text);
            } else {
              /* Replace the partial with a clean final bubble */
              const last = transcriptEl && transcriptEl.lastElementChild;
              if (last && last.classList.contains('user') && !last.classList.contains('partial')) {
                last.textContent = text.trim();      /* Update in-place */
              } else {
                appendChatMessage('user', text);
              }
              showThinking();                        /* Show thinking dots while ARIA processes */
            }
          }
          handleFinalTranscript(message);
          return;
        }
      }

      /* ── ARIA / assistant reply ── */
      if (msgType === 'assistant' || msgType === 'bot') {
        removeThinking();
        const text = extractMessageText(message);
        if (text) appendChatMessage('aria', text);
        handleFinalTranscript(message);
        return;
      }

      if (msgType === 'conversation-update') {
        handleConversationUpdate(message);
      }
    });

    vapi.on('error', (error) => {
      clearTimeout(connectingTimer);
      console.error('Vapi error:', error);
      active = false;
      starting = false;
      removeThinking();
      setState('');
      setHintMessage('Something went wrong — check the browser console');
      syncToSheets('call-error');
    });
  }

  /* ═══════════════════════════════════════════════════════════════
     TRANSCRIPT PROCESSING  (final turns only)
  ═══════════════════════════════════════════════════════════════ */
  function handleFinalTranscript(message) {
    const text = extractMessageText(message);
    if (!text) return;

    const role = getMessageRole(message);
    const transcriptKey = `${role}|${text}`;
    if (transcriptKey === lastTranscriptKey) return;
    lastTranscriptKey = transcriptKey;

    bookingLead.rawTranscript.push({
      at:   new Date().toISOString(),
      role,
      text
    });

    detectLeadFields(text, role);
    scheduleSheetSync('transcript-update');

    /*
      Only trigger completion on ARIA's turns.
    */
    if (role === 'assistant' && isCompletionPhrase(text)) {
      finishConversationAndAdvance();
    }
  }

  function isCompletionPhrase(text) {
    if (COMPLETION_PHRASE_REGEX.test(text)) return true;
    return TAKE_CARE_CLOSEOUT_REGEX.test(text) && !/\btake care\s+of\b/i.test(text);
  }

  function handleConversationUpdate(message) {
    const messages = Array.isArray(message.messages)
      ? message.messages
      : Array.isArray(message.conversation)
        ? message.conversation
        : [];

    const lastAssistantMessage = [...messages].reverse().find((item) => {
      return getMessageRole(item) === 'assistant' && extractMessageText(item);
    });

    if (lastAssistantMessage) handleFinalTranscript(lastAssistantMessage);
  }

  /* ═══════════════════════════════════════════════════════════════
     COMPLETION FLOW — close call + advance to paywall
     Runs after ARIA says a configured closeout phrase.
  ═══════════════════════════════════════════════════════════════ */
  function finishConversationAndAdvance() {
    if (finishing) return;

    finishing = true;
    bookingLead.completionPhrase = true;
    saveLeadSnapshot();
    syncToSheets('completion');
    setHintMessage('All set — taking you to the next step…');

    clearTimeout(completionRedirectTimer);
    completionRedirectTimer = setTimeout(() => {
      if (vapi && active) {
        try { vapi.stop(); } catch (e) {
          console.warn('Could not stop Vapi before redirect:', e);
        }
      }
      goToNextStep();
    }, COMPLETION_REDIRECT_DELAY_MS);
  }

  /* ═══════════════════════════════════════════════════════════════
     SPOKEN TEXT NORMALISATION
     Converts spoken-aloud formats → machine-readable before detection.
     Handles emails said aloud, phonetic alphabets, and common fillers.
  ═══════════════════════════════════════════════════════════════ */

  /* NATO / common phonetic alphabet → letter */
  const PHONETIC_MAP = {
    alpha:'a', bravo:'b', charlie:'c', delta:'d', echo:'e',
    foxtrot:'f', golf:'g', hotel:'h', india:'i', juliet:'j',
    kilo:'k', lima:'l', mike:'m', november:'n', oscar:'o',
    papa:'p', quebec:'q', romeo:'r', sierra:'s', tango:'t',
    uniform:'u', victor:'v', whiskey:'w', xray:'x', yankee:'y',
    zulu:'z',
    /* common non-NATO variants */
    apple:'a', boy:'b', cat:'c', dog:'d', edward:'e',
    frank:'f', george:'g', henry:'h', ida:'i', john:'j',
    king:'k', love:'l', mary:'m', nancy:'n', ocean:'o',
    peter:'p', queen:'q', robert:'r', sam:'s', thomas:'t',
    uncle:'u', victor:'v', william:'w', young:'y', zebra:'z'
  };

  /**
   * Resolve a single phonetic token to its letter, or return the
   * original token if it's already a single letter.
   */
  function resolvePhonetic(token) {
    const t = token.toLowerCase();
    if (t.length === 1) return t;
    return PHONETIC_MAP[t] || token;
  }

  /**
   * Convert spoken email / identifier text to a usable string.
   * Handles:
   *   "john at gmail dot com"          → john@gmail.com
   *   "j o h n at g mail dot com"     → john@gmail.com
   *   "juliet oscar hotel november …"  → john@…
   *   "underscore / hyphen / dash"
   */
  function normalizeSpokenIdentifier(raw) {
    return raw
      /* punctuation words */
      .replace(/\bat\b/gi,         '@')
      .replace(/\bdot\b/gi,        '.')
      .replace(/\bperiod\b/gi,     '.')
      .replace(/\bunderscore\b/gi, '_')
      .replace(/\bdash\b/gi,       '-')
      .replace(/\bhyphen\b/gi,     '-')
      /* resolve phonetics — word by word */
      .split(/\s+/)
      .map(resolvePhonetic)
      .join('')
      /* collapse any remaining spaces */
      .replace(/\s+/g, '')
      .toLowerCase();
  }

  /**
   * Attempt to extract an email from a block of text that might be
   * spoken aloud in any of the normalised formats above.
   * Returns null if nothing plausible is found.
   */
  function extractSpokenEmail(text) {
    /* 1. Standard typed-style email already in text */
    const directMatch = text.match(/[A-Z0-9._%+\-]+@[A-Z0-9.\-]+\.[A-Z]{2,}/i);
    if (directMatch) return directMatch[0].toLowerCase();

    /* 2. Spoken "… at … dot …" pattern */
    const spokenMatch = text.match(
      /([A-Za-z0-9 .]+?)\s+(?:at)\s+([A-Za-z0-9 .]+?)\s+(?:dot)\s+([A-Za-z]{2,})/i
    );
    if (spokenMatch) {
      const local  = normalizeSpokenIdentifier(spokenMatch[1]);
      const domain = normalizeSpokenIdentifier(spokenMatch[2]);
      const tld    = normalizeSpokenIdentifier(spokenMatch[3]);
      const email  = `${local}@${domain}.${tld}`;
      /* Sanity-check: must look like a real email */
      if (/^[a-z0-9._+-]+@[a-z0-9.-]+\.[a-z]{2,}$/.test(email)) return email;
    }

    return null;
  }

  /* ═══════════════════════════════════════════════════════════════
     TEXT EXTRACTION — normalised across Vapi SDK versions
  ═══════════════════════════════════════════════════════════════ */
  function extractMessageText(message) {
    if (!message) return '';
    if (Array.isArray(message.content)) {
      return message.content
        .map((part) => typeof part === 'string' ? part : (part.text || part.content || ''))
        .join(' ')
        .trim();
    }
    return String(
      message.transcript || message.text || message.content || message.message || ''
    ).trim();
  }

  function getMessageRole(message) {
    const rawRole = String((message && (message.role || message.type || message.speaker)) || '');
    if (rawRole.match(/user|customer|human/i)) return 'user';
    if (rawRole.match(/assistant|bot|aria|ai/i)) return 'assistant';
    return rawRole || 'unknown';
  }

  /* ═══════════════════════════════════════════════════════════════
     LEAD FIELD DETECTION
  ═══════════════════════════════════════════════════════════════ */
  function detectLeadFields(text, role) {

    /* ── EMAIL (spoken + typed formats) ── */
    const emailFound = extractSpokenEmail(text);
    if (emailFound) bookingLead.email = emailFound;

    /* ── PHONE ── */
    const phone = text.match(
      /(?:\+?1[\s\-.]?)?\(?\d{3}\)?[\s\-.]?\d{3}[\s\-.]?\d{4}/
    );
    if (phone && !bookingLead.phone) bookingLead.phone = phone[0].trim();

    /* ── NAME ──
       Matches explicit "my name is …", "I'm …", or a bare name reply.
       Also captures ARIA's read-back so a correction is caught:
         ARIA: "Nice to meet you, Sarah — did I get that right?"
         USER: "Actually it's Sara"  ← bare correction
    */
    const nameWithPrefix = text.match(
      /(?:my name is|i am|i'm|i go by|this is|it'?s|call me|actually it'?s|it is|no[,]? it'?s|no[,]? it is)\s+([A-Z][a-z]+(?: [A-Z][a-z]+){0,3})/i
    );
    if (nameWithPrefix) {
      bookingLead.name = cleanValue(nameWithPrefix[1]);
    } else if (role === 'user' && !bookingLead.name) {
      const bareNamePattern = /^([A-Z][a-z]+(?: [A-Z][a-z]+){0,2})[.,!?]?\s*$/.exec(text);
      if (bareNamePattern && text.length < 40) {
        bookingLead.name = cleanValue(bareNamePattern[1]);
      }
    }

    /* ── BUSINESS NAME ── */
    if (!bookingLead.businessName) {
      const biz = text.match(
        /(?:business(?:\s+name)? is|company(?:\s+name)? is|my business is|my company is|we are called|it'?s called|we go by|called)\s+([^,.!?]{2,70})/i
      );
      if (biz) bookingLead.businessName = cleanValue(biz[1]);
    }

    /* ── LOCATION ── */
    if (!bookingLead.location) {
      const loc = text.match(
        /(?:located in|location is|we are in|i'?m in|i am in|based in|out of|from)\s+([^,.!?]{2,60})/i
      );
      if (loc) bookingLead.location = cleanValue(loc[1]);
    }

    /* ── APPOINTMENT TIME ── */
    if (!bookingLead.appointmentTime) {
      const timePattern = text.match(
        /(?:available|free|open|works for me|can do|prefer|want|schedule(?:d)?|book(?:ed)?) (?:at|on|for|a[t]?)?\s*((?:monday|tuesday|wednesday|thursday|friday|saturday|sunday|tomorrow|today|next week|\d{1,2}(?::\d{2})?\s*(?:am|pm)|morning|afternoon|evening)[^,.!?]{0,40})/i
      );
      if (timePattern) bookingLead.appointmentTime = cleanValue(timePattern[1]);
    }

    /* ── AVAILABILITY ── */
    if (!bookingLead.availability) {
      const availPattern = text.match(
        /\b(anytime|flexible|any (?:day|time)|works for (?:me|us)|availability (?:is|looks))([^.!?]{0,60})/i
      );
      if (availPattern) bookingLead.availability = cleanValue((availPattern[1] + availPattern[2]).trim());
    }

    /* ── BOOKING INTENT ── */
    if (!bookingLead.bookingIntent) {
      bookingLead.bookingIntent = /\b(book|booking|appointment|schedule|calendar|call|consultation|meeting|slot)\b/i.test(text);
    }

    /* ── SERVICE (questionnaireService — sheet col P) ──
       Captures what the user does / offers */
    if (!bookingLead.service) {
      const svc = text.match(
        /(?:(?:my |our )?(?:service is|services? (?:include|are)|we (?:offer|do|provide|specialize in|focus on)|i (?:offer|do|provide|specialize in|help with)|primary service is|main service is))\s+([^,.!?]{3,80})/i
      );
      if (svc) bookingLead.service = cleanValue(svc[1]);
    }

    /* ── PAIN / CHALLENGE (questionnairePain — sheet col Q) ──
       Captures the problem they want solved */
    if (!bookingLead.pain) {
      const pain = text.match(
        /(?:(?:my |our |the )?(?:biggest (?:challenge|problem|issue|struggle) is|challenge is|problem is|pain (?:point )?is|struggling with|having trouble with|issue is|i (?:need help|can't|cannot) (?:with )?|trying to (?:fix|solve|improve)))\s+([^,.!?]{3,100})/i
      );
      if (pain) bookingLead.pain = cleanValue(pain[1]);
    }

    /* ── SPEND / BUDGET (questionnaireSpend — sheet col R) ──
       Captures budget, ad spend, or revenue figures */
    if (!bookingLead.spend) {
      const spend = text.match(
        /(?:(?:(?:monthly |weekly |annual |current )?(?:budget|spend|spending|ad spend|revenue|make|earn|doing|bringing in)) (?:is |of |about |around |roughly )?)(\$[\d,]+(?:k|K|m|M)?(?:\s*(?:per|a|\/)\s*(?:month|week|year))?|\d+(?:,\d{3})*(?:k|K|m|M)?(?:\s*(?:per|a|\/)\s*(?:month|week|year))?)/i
      );
      if (spend) bookingLead.spend = cleanValue(spend[1]);
    }

    saveLeadSnapshot();
  }

  /* ═══════════════════════════════════════════════════════════════
     HELPERS
  ═══════════════════════════════════════════════════════════════ */
  function cleanValue(value) {
    return value
      .replace(/\b(and|but|uh|um|yeah|yes|no|so|like|okay|ok)\b.*$/i, '')
      .replace(/[.!?,]+$/, '')
      .trim();
  }

  function saveLeadSnapshot() {
    try {
      localStorage.setItem('ariaBookingLead', JSON.stringify(bookingLead));
    } catch (e) { console.warn('Could not save lead snapshot:', e); }
  }

  function goToNextStep() {
    window.location.href = NEXT_STEP_URL;
  }

  /* ═══════════════════════════════════════════════════════════════
     PAGE INIT
  ═══════════════════════════════════════════════════════════════ */
  window.addEventListener('DOMContentLoaded', () => {
    requestAnimationFrame(() => requestAnimationFrame(() => {
      document.body.classList.add('page-ready');
    }));

    getVapiConstructor().catch((error) => {
      console.error('ARIA WARNING: Vapi SDK preload failed:', error);
    });

    setTimeout(() => {
      if (!VapiConstructor) {
        console.error(
          'ARIA WARNING: Vapi SDK did not load. ' +
          'Check for network errors, ad-blockers, or CSP headers.'
        );
      }
    }, 3000);

    console.info('ARIA: lead sync target is', ARIA_SHEETS_WEBHOOK_URL);
  });

  /* Persist lead + sync to Sheets when tab closes or navigates away */
  window.addEventListener('pagehide', () => {
    saveLeadSnapshot();
    syncToSheets(
      active ? 'pagehide-active-call' : 'pagehide',
      { preferBeacon: true }
    );
  });
</script>
</body>
</html>
